name: Final Build - Universal Recovery MT9632

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev libssl-dev x11proto-core-dev libx11-dev libgl1-mesa-dev g++-multilib tox gcc-multilib libxml2-utils xsltproc unzip python2 python3 libncurses5

      - name: Setup Repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Sync Source
        run: |
          mkdir work && cd work
          git config --global user.name "salimalqaaod1-lgtm"
          git config --global user.email "salim.alqaaod1@gmail.com"
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-9.0
          repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Clone Device Tree
        run: |
          cd work
          git clone https://github.com/salimalqaaod1-lgtm/ORIGINAL_RECOVERY device/mediatek/m7332
          # تطبيق إصلاح الصلاحيات فوراً بعد التحميل
          chmod -R 777 device/mediatek/m7332/recovery/root || true

      - name: Build Image
        run: |
          cd work
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch mt9632_m7332-eng
          make recoveryimage -j$(nproc --all)

      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: Recovery-MT9632-Final
          path: work/out/target/product/m7332/recovery.img
