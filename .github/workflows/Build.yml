name: Build TWRP Recovery

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Your Repository
      uses: actions/checkout@v4

    - name: Cleanup Space
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /opt/ghc
        sudo apt clean

    - name: Install Build Dependencies
      run: |
        sudo apt update
        sudo apt install -y bc build-essential libssl-dev libxml2-utils git zip unzip curl python3 python-is-python3

    - name: Set up Repo Tool
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Sync TWRP Source
      run: |
        mkdir twrp
        cd twrp
        git config --global user.email "gh-actions@example.com"
        git config --global user.name "GitHub-Actions"
        # تم استخدام مستودع AOSP وفرع twrp-11 المتوافق
        ~/bin/repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11 --depth=1
        ~/bin/repo sync -c -j$(nproc) --no-tags --no-clone-bundle

    - name: Move Device Tree to Source
      run: |
        mkdir -p twrp/device/mediatek/m7332
        cp -r ./* twrp/device/mediatek/m7332/ || true

    - name: Build TWRP
      run: |
        cd twrp
        # التأكد من كتابة مسار ملف envsetup بشكل صحيح
        source build
        
        # البحث عن اسم المنتج تلقائياً من المجلد لضمان البناء مهما كان الاسم
        PRODUCT_CONF=$(find device/mediatek/m7332/ -name "twrp_*.mk" | head -n 1 | xargs basename | cut -d'.' -f1)
        
        echo "The build will start for: $PRODUCT_CONF"
        
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        
        # تنفيذ أمر lunch
        lunch ${PRODUCT_CONF}-eng
        
        # بناء الريكفري
        mka recoveryimage -j$(nproc)


    - name: Upload Recovery Image
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-m7332-Build
        path: twrp/out/target/product/m7332/recovery.img
