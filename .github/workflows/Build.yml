name: Build TWRP Recovery

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Your Repository
      uses: actions/checkout@v4

    - name: Cleanup Space
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /opt/ghc
        sudo apt clean

    - name: Install Build Dependencies
      run: |
        sudo apt update
        sudo apt install -y bc build-essential libssl-dev libxml2-utils git zip unzip curl python3 python-is-python3

    - name: Set up Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Sync TWRP Source
      run: |
        mkdir twrp
        cd twrp
        git config --global user.email "gh-actions@example.com"
        git config --global user.name "GitHub-Actions"
        # استخدام سورس TWRP المتوافق مع أندرويد 11
        ~/bin/repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11 --depth=1
        ~/bin/repo sync -c -j$(nproc) --no-tags --no-clone-bundle

    - name: Move Device Tree to Source
      run: |
        # إنشاء المسار الكامل للجهاز داخل سورس TWRP
        mkdir -p twrp/device/mediatek/m7332
        
        # نسخ كافة الملفات والمجلدات (بما فيها recovery/root) من الواجهة
        # تم استخدام أمر cp -R لضمان النسخ المتكرر للمجلدات الداخلية
        # مع استثناء مجلد 'twrp' لتجنب النسخ اللانهائي داخل نفسه
        find . -maxdepth 1 -not -name 'twrp' -not -name '.' -not -name '..' -not -name '.git' -not -name '.github' -exec cp -R {} twrp/device/mediatek/m7332/ \;
        
        # التأكد من نظافة المسار من ملفات الجيت الزائدة
        rm -rf twrp/device/mediatek/m7332/.github
        rm -rf twrp/device/mediatek/m7332/.git

    - name: Build Minimal TWRP
      run: |
        cd twrp
        source build/envsetup.sh
        
        export MY_PRODUCT="twrp_m7332"
        export ALLOW_MISSING_DEPENDENCIES=true
        export BUILD_BROKEN_MISSING_PGO_STATS_ERROR=true
        export BUILD_BROKEN_DUP_RULES=true
         mv bootable/recovery/minadbd/Android.bp bootable/recovery/minadbd/Android.bp.bak   
               sed -i 's/"minadbd"//g' bootable/recovery/Android.bp    
               # 1. تعطيل الاعتماد على health داخل سورس الريكفري نفسه
        # سنقوم بتبديل طلب libhealthhalutils بمكتبة فارغة أو حذفه من ملف الإعداد
        sed -i 's/"libhealthhalutils"//g' bootable/recovery/minadbd/Android.bp
        sed -i 's/"android.hardware.health@2.0"//g' bootable/recovery/minadbd/Android.bp
        
        # 2. تزوير تعريف الوحدة داخل Soong (هذا هو الأهم)
        # سنقوم بإنشاء ملف Android.bp وهمي في مجلد جديد ليعرف Soong أن هذه الوحدات "موجودة"
        mkdir -p hardware/interfaces/health/2.0/dummy
        mkdir -p hardware/interfaces/health/2.0/default
        cat <<EOF > hardware/interfaces/health/2.0/default/Android.bp
        cc_library_static {
            name: "libhealthhalutils",
            recovery_available: true,
            srcs: [],
        }
        cc_library_shared {
            name: "android.hardware.health@2.0",
            recovery_available: true,
            srcs: [],
        }
        EOF

        # 3. تنظيف مخرجات Soong القديمة لإجباره على إعادة فحص الملفات الجديدة
        rm -rf out/soong/.intermediates/bootable/recovery/minadbd

        # الأوامر السحرية لتجاهل أخطاء VTS و Soong
        find system/core system/tools hardware/interfaces -name "Android.bp" -path "*/tests/*" -exec mv {} {}.bak \;
        find system/core system/tools hardware/interfaces -name "Android.mk" -path "*/tests/*" -exec mv {} {}.bak \;
        find system/security/keystore -name "Android.bp" -exec mv {} {}.bak \;
        find system/core/trusty -name "Android.bp" -exec mv {} {}.bak \;
        rm -rf system/tools/hidl/test
        export TEMPORARY_DISABLE_PATH_RESTRICTIONS=true
        export SELINUX_IGNORE_NEVERALLOWS=true
        rm -rf hardware/interfaces
        rm -rf frameworks/hardware/interfaces
        rm -rf hardware/interfaces/automotive
        rm -rf hardware/interfaces/audio
        rm -rf hardware/interfaces/camera
        rm -rf system/core/healthd
        rm -rf system/core/fastboot 
        rm -rf system/core/fastbootd 
        rm -rf device/mediatek/common
        lunch twrp_m7332-eng || lunch twrp_m7332-userdebug
       
                # تصحيح حلقة التزوير: وضعنا علامات اقتباس وأزلنا المسافات الخاطئة
        for lib in \
          "android.hardware.boot@1.0" \
          "android.hardware.boot@1.1" \
          "android.hardware.health@2.0-impl-default" \
          "android.hardware.health@2.0" \
          "android.hardware.health@1.0-convert" \
          "libopenaes" \
          "libfscrypt" \
          "libhealthservice" \
          "libhealthstoragedefault" \
          "libcryptfs" \
         "android.hardware.confirmationui@1.0" \
          "android.hardware.keymaster@3.0" \
          "android.hardware.keymaster@4.0" \
          "android.hardware.keymaster@4.1" \
          "libkeymaster4support" \
          "libkeymaster4_1support" \
          "libkeymaster_messages" \
          "libkeystore_aidl" \
          "libkeystore_binder" \
          "libkeystore_parcelables" \
          "libkeymaster_messages" \
          "libsoftkeymasterdevice" \
          "libkeymaster_portable" \
          "libkeymaster_staging" \
          "libdm_user" \
          "libfs_mgr_binder" \
          "libsnapshot_nobinder" \
          "android.hardware.confirmationui@1.0" \
          "android.hardware.keymaster@3.0" \
          "android.hardware.keymaster@4.0" \
          "android.hardware.keymaster@4.1" \
          "libkeymaster4support" \
          "libkeymaster4_1support" \
          "android.hardware.tests.baz@1.0_interface" \
          "android.hardware.graphics.common@1.0" \
          "android.hardware.graphics.common@1.1" \
          "android.hardware.graphics.common@1.2" \
          "android.hardware.graphics.bufferqueue@2.0"; do
          
          mkdir -p "out/target/product/m7332/obj/SHARED_LIBRARIES/${lib}_intermediates/"
          touch "out/target/product/m7332/obj/SHARED_LIBRARIES/${lib}_intermediates/${lib}.so.toc"
        done
       
        # 2. التأكد من وجود المكتبات المشتركة (Shared) أيضاً للهيلث
        for lib in "android.hardware.health@2.0" "android.hardware.health@1.0" "libhealthservice"; do
          mkdir -p "out/target/product/m7332/obj/SHARED_LIBRARIES/${lib}_intermediates/"
          touch "out/target/product/m7332/obj/SHARED_LIBRARIES/${lib}_intermediates/${lib}.so.toc"
        done
         
         for lib in "libhealthhalutils" "libhealthstoragedefault"; do
          # إنشاء المسار للنسخة الساكنة (Static)
          mkdir -p "out/target/product/m7332/obj/STATIC_LIBRARIES/${lib}_intermediates/"
          # إنشاء ملف .a وهمي (Empty Archive)
          ar rcs "out/target/product/m7332/obj/STATIC_LIBRARIES/${lib}_intermediates/${lib}.a"
        done
        # 1. حذف طلب مكتبات الصحة من ملف إعداد minadbd تماماً
        # هذا الأمر سيبحث عن السطور التي تحتوي على التبعيات ويحذفها
        sed -i '/"libhealthhalutils"/d' bootable/recovery/minadbd/Android.bp
        sed -i '/"android.hardware.health@2.0"/d' bootable/recovery/minadbd/Android.bp
        
        # 2. حذف الاستدعاءات البرمجية داخل كود C++ لكي لا يحدث خطأ أثناء الربط
        # سنقوم بتعطيل الأسطر التي تحاول استخدام وظائف الصحة
        sed -i 's/health::/ \/\/ health::/g' bootable/recovery/minadbd/minadbd_services.cpp
        
        # 3. إخبار النظام بأننا لا نملك واجهة صحة (Health HAL)
        export TW_NO_BATTERY_PERCENT := true
        export ALLOW_MISSING_DEPENDENCIES=true

        make recoveryimage -j$(nproc) || make recoveryimage -j1


    - name: Upload Recovery Image
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-m7332-Final-Result
        # رفع ملف الـ recovery.img الناتج مهما كان اسم المجلد الفرعي
        path: twrp/out/target/product/*/recovery.img
