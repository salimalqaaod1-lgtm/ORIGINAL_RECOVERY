name: Build TWRP 9.0 for Smart TV

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Your Repository
        uses: actions/checkout@v4

      - name: Cleanup Space & Increase Swap
        run: |
          # تنظيف المساحة
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          # حل مشكلة Text file busy: إيقاف السواب القديم ومسحه ثم إنشاء جديد
          sudo swapoff -a || true
          sudo rm -f /swapfile_new
          sudo fallocate -l 10G /swapfile_new
          sudo chmod 600 /swapfile_new
          sudo mkswap /swapfile_new
          sudo swapon /swapfile_new

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential git-core gnupg flex bison gperf libsdl1.2-dev libesd0-dev libwxgtk3.0-gtk3-dev squashfs-tools build-essential zip curl libncurses5-dev zlib1g-dev openjdk-8-jdk gcc-multilib g++-multilib x11proto-core-dev libx11-dev libgl1-mesa-dev libxml2-utils xsltproc unzip

      - name: Set up Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "PATH=$HOME/bin:$PATH" >> $GITHUB_ENV

      - name: Sync TWRP 9.0 Source
        run: |
          export PATH=~/bin:$PATH
          mkdir twrp && cd twrp
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-9.0 --depth=1
          repo sync -c -j4 --no-tags --no-clone-bundle --force-sync

          # --- حل مشكلة الـ Battery النهائي ---
          # سنقوم بإفراغ ملف البطارية لمنع أخطاء Result و health تماماً
          echo -e "#include <recovery_utils/battery_utils.h>\n\nResult get_battery_stats(int* level, bool* charging) {\n    return Result::UNKNOWN;\n}" > bootable/recovery/recovery_utils/battery_utils.cpp || true

      - name: Build TWRP
        run: |
          export PATH=~/bin:$PATH
          cd twrp
          # تأكد من وضع رابط الـ Device Tree الخاص بك هنا
          git clone https://github.com/salimalqaaod1-lgtm/android_device_mediatek_m7332.git device/mediatek/m7332
          
          source build/envsetup.sh
          lunch twrp_m7332-eng
          # استخدام -j2 لضمان استقرار الرام
          mka recoveryimage -j2

      - name: Upload Recovery Image
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-MT9632-Fixed
          path: twrp/out/target/product/m7332/recovery.img
