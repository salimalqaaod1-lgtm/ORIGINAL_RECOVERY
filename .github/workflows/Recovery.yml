name: Build TWRP 9.0 for Smart TV

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Your Repository
        uses: actions/checkout@v4

      

      - name: Install All Dependencies and Fix Libs
        run: |
          sudo apt-get update
          # تثبيت الأدوات الأساسية
          sudo apt-get install -y bc build-essential git-core gnupg flex bison gperf libsdl1.2-dev \
            libwxgtk3.0-gtk3-dev squashfs-tools zip curl zlib1g-dev openjdk-8-jdk \
            gcc-multilib g++-multilib x11proto-core-dev libx11-dev libgl1-mesa-dev libxml2-utils \
            xsltproc unzip python2 python-is-python2 lib32ncurses5-dev lib32z1-dev
          
          # تحميل وتثبيت المكتبات المفقودة التي سببت الخطأ في الصورة (إصدارات محددة)
          wget http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.2-0ubuntu2_amd64.deb
          wget http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libncurses5_6.2-0ubuntu2_amd64.deb
          sudo dpkg -i libtinfo5_6.2-0ubuntu2_amd64.deb
          sudo dpkg -i libncurses5_6.2-0ubuntu2_amd64.deb

          # إجبار النظام على استخدام Python 2 لتجنب أخطاء السكربتات (SyntaxError)
          sudo ln -sf /usr/bin/python2 /usr/bin/python
          
          # توفير توافقية إضافية للمكتبات
          sudo ln -sf /lib/x86_64-linux-gnu/libtinfo.so.6 /lib/x86_64-linux-gnu/libtinfo.so.5

      - name: Set up Repo Tool
        run: |
          # إنشاء مجلد الأدوات
          mkdir -p ~/bin
          
          # تحميل أداة Repo من مستودعات جوجل الرسمية
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          
          # إعطاء صلاحيات التنفيذ
          chmod a+x ~/bin/repo
          
          # ربط الأداة بالنظام ليتم التعرف عليها في أي مكان
          sudo ln -sf ~/bin/repo /usr/bin/repo
          
      - name: Sync TWRP 9.0 Source
        run: |
          export PATH=~/bin:$PATH
          mkdir twrp && cd twrp
          # استخدام سورس Omni المضمون لإصدار 9.0
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-9.0 --depth=1
          repo sync -c -j$(nproc --all) --no-tags --no-clone-bundle --force-sync

          # "تطهير" ملف البطارية
          # echo -e "#include <recovery_utils/battery_utils.h>\n\nResult get_battery_stats(int* level, bool* charging) {\n    return Result::UNKNOWN;\n}" > bootable/recovery/recovery_utils/battery_utils.cpp || true        

    
      - name: Move Device Tree to Source
        run: |
          # 1. إنشاء المجلد الوجهة داخل سورس الأندرويد
          chmod -R 777 device/mediatek/m7332/recovery/root || true
          mkdir -p twrp/device/mediatek/m7332
          
          # 2. نقل ملفاتك من المجلد الحالي إلى مسار البناء
          # نستخدم --exclude لمنع rsync من نسخ مجلد twrp إلى داخل نفسه (تجنب الـ Loop)
          # ونمنع نسخ ملفات الـ git والـ github لأن المترجم لا يحتاجها
          rsync -av ./ twrp/device/mediatek/m7332/ --exclude twrp --exclude .git --exclude .github
          
          # 3. التأكد من أن الملفات وصلت للمكان الصحيح (اختياري للتأكد من السجلات)
          ls -R twrp/device/mediatek/m7332

      - name: Build TWRP
        run: |
          export PATH=~/bin:$PATH
          cd twrp
          # إصلاح الأذونات لملفات الـ root
          chmod -R 777 device/mediatek/m7332/recovery/root || true
          sed -i 's/[[:space:]]*$//' device/mediatek/m7332/*.mk

          source build/envsetup.sh
          lunch mt9632_m7332-eng || lunch mt9632_m7332-userdebug
          ALLOW_MISSING_DEPENDENCIES=true    
          mka recoveryimage -j$(nproc --all)


      - name: Upload Recovery Image
        uses: actions/upload-artifact@v4
        with:
          name: mt9632-Final
          path: twrp/out/target/product/m7332/recovery.img
