name: Build TWRP Android 9 for Smart TV

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout Your Repository
        uses: actions/checkout@v2

      - name: Cleanup Space & Increase Swap
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo fallocate -l 8G /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential git-core gnupg flex bison gperf libsdl1.2-dev libesd0-dev libwxgtk3.0-gtk3-dev squashfs-tools build-essential zip curl libncurses5-dev zlib1g-dev openjdk-8-jdk gcc-multilib g++-multilib x11proto-core-dev libx11-dev libgl1-mesa-dev libxml2-utils xsltproc unzip

      - name: Set up Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "PATH=$HOME/bin:$PATH" >> $GITHUB_ENV

      - name: Sync TWRP 9.0 Source
        run: |
          export PATH=~/bin:$PATH
          mkdir twrp && cd twrp
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-9.0 --depth=1
          repo sync -c -j$(nproc --all) --no-tags --no-clone-bundle --force-sync

      - name: Move Device Tree to Source
        run: |
          # استبدل اليوزر والمستودع بالروابط الخاصة بك
          cd twrp
          git clone https://github.com/YOUR_USERNAME/YOUR_DEVICE_TREE.git device/mediatek/m7332

      - name: Build TWRP
        run: |
          export PATH=~/bin:$PATH
          cd twrp
          source build/envsetup.sh
          # تأكد من اسم الـ lunch الصحيح لجهازك
          lunch twrp_m7332-eng || lunch twrp_m7332-userdebug
          mka recoveryimage -j$(nproc --all)

      - name: Upload Recovery Image
        uses: actions/upload-artifact@v2
        with:
          name: TWRP-SmartTV-MT9632
          path: twrp/out/target/product/m7332/recovery.img
